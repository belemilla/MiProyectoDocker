services:
  db:
    image: mysql:8.0
    container_name: mi_bd
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: crud_db
      MYSQL_USER: user
      MYSQL_PASSWORD: user_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app_network

  web:
    build: .
    container_name: mi_php
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./app/:/var/www/html/
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: user
      DB_PASSWORD: user_password
      DB_NAME: crud_db
    networks:
      - app_network

volumes:
  db_data:

networks:
  app_network: